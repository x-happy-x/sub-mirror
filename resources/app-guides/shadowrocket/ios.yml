app: shadowrocket
os: ios
template: |
  ## [download] Установка приложения
  Откройте страницу в App Store и установите приложение. Запустите его, в окне разрешения VPN-конфигурации нажмите Allow и введите свой пароль.
  [button:App Store](https://apps.apple.com/ru/app/shadowrocket/id932747118)
  ## [danger] Включите HWID
  Перейдите в раздел Настройки, найдите раздел Обновить, найдите пункт Подписаться и переключите Отправить HWID в положение ВКЛ
  ## [add] Добавление подписки
  Нажмите кнопку ниже — приложение откроется, и подписка добавится автоматически.
  [button:Добавить подписку]({DEEPLINK})
  ## [warning] Добавить правила маршрутизации
  При добавлении роутинга, сайты внутри страны будут открываться без VPN
  [button:Добавить правила для России](https://cdn.sm1ky.pl/s/eB4eYAxSNGk8gja/download)
  ## [usage] Подключение и использование
  В главном разделе нажмите большую кнопку включения в центре для подключения к VPN. Не забудьте выбрать сервер в списке серверов. При необходимости выберите другой сервер из списка серверов.