app: prizrak-box
os: linux
template: |
  ## [download] Установка приложения
  Выберите пакет под вашу архитектуру и установите Prizrak-Box.
  [button:amd64 (.deb)](https://github.com/legiz-ru/Prizrak-Box/releases/latest/download/linux-amd64.deb)
  [button:amd64 (.rpm)](https://github.com/legiz-ru/Prizrak-Box/releases/latest/download/linux-amd64.rpm)
  [button:arm64 (.deb)](https://github.com/legiz-ru/Prizrak-Box/releases/latest/download/linux-arm64.deb)
  [button:arm64 (.rpm)](https://github.com/legiz-ru/Prizrak-Box/releases/latest/download/linux-arm64.rpm)
  ## [danger] Предупреждение
  Запустите программу.
  ## [add] Добавление подписки
  Нажмите кнопку ниже, чтобы автоматически добавить подписку.
  [button:Добавить подписку]({DEEPLINK})
  ## [warning] Если подписка не добавилась
  Если после нажатия на кнопку ничего не произошло, добавьте подписку вручную.
  Нажмите на этой странице кнопку «Показать ссылку и QR» и скопируйте ссылку.
  В Prizrak-Box перейдите в раздел Профили, нажмите кнопку +, вставьте вашу скопированную ссылку и нажмите Потдвердить.
  ## [usage] Подключение и использование
  Выберите добавленную подписку в разделе Профили. Выбрать страну сервера можно в разделе Прокси (🚀). Установите переключатель TUN в положение ВКЛ.
