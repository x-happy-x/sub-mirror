app: koala-clash
os: linux
template: |
  ## [download] Установка приложения
  Выберите подходящую версию для вашего устройства, нажмите на кнопку ниже и установите приложение.
  [button:amd64 (.deb)](https://github.com/coolcoala/clash-verge-rev-lite/releases/latest/download/Koala.Clash_amd64.deb)
  [button:amd64 (.rpm)](https://github.com/coolcoala/clash-verge-rev-lite/releases/latest/download/Koala.Clash.x86_64.rpm)
  [button:arm64 (.deb)](https://github.com/coolcoala/clash-verge-rev-lite/releases/latest/download/Koala.Clash_arm64.deb)
  [button:arm64 (.rpm)](https://github.com/coolcoala/clash-verge-rev-lite/releases/latest/download/Koala.Clash.aarch64.rpm)
  ## [danger] Предупреждение
  Если вы ранее использовали Clash Verge Rev, то его требуется удалить перед установкой Koala Clash.
  ## [add] Добавление подписки
  Нажмите кнопку ниже, чтобы добавить подписку
  [button:Добавить подписку]({DEEPLINK})
  ## [warning] Если подписка не добавилась
  Если после нажатия на кнопку ничего не произошло, добавьте подписку вручную. 
  Нажмите на этой странице кнопку «Показать ссылку и QR» и скопируйте ссылку.
  В Koala Clash перейдите на главную страницу, нажмите кнопку Добавить профиль и вставьте ссылку в текстовое поле, затем нажмите на кнопку Импорт.
  ## [usage] Подключение и использование
  Выбрать сервер можно внизу на главной странице, включить VPN можно нажав на главной странице на большую кнопку по центру.
