app: happ
os: windows
template: |
  ## [download] Установка приложения
  Выберите подходящую версию для вашего устройства, нажмите на кнопку ниже и установите приложение.
  [button:Windows](https://github.com/Happ-proxy/happ-desktop/releases/latest/download/setup-Happ.x64.exe)
  ## [add] Добавление подписки
  Нажмите кнопку ниже — приложение откроется, и подписка добавится автоматически.
  [button:Добавить подписку]({DEEPLINK})
  ## [warning] Если подписка не добавилась
  Если после нажатия ничего не произошло, откройте блок ссылки и QR, скопируйте короткую ссылку и добавьте ее вручную через URL.
  ## [usage] Подключение и использование
  В главном разделе нажмите большую кнопку включения в центре для подключения к VPN. Не забудьте выбрать сервер в списке серверов. При необходимости выберите другой сервер из списка серверов.
