app: flclashx
os: android
template: |
  ## [download] Установка приложения
  Скачайте и установите FlClashX APK
  [button:Скачать APK](https://github.com/pluralplay/FlClashX/releases/latest/download/FlClashX-android-universal.apk)
  ## [add] Добавление подписки
  Нажмите кнопку ниже, чтобы добавить подписку
  [button:Добавить подписку]({DEEPLINK})
  ## [warning] Если подписка не добавилась
  Если после нажатия на кнопку ничего не произошло, добавьте подписку вручную. Нажмите на этой страницу кнопку Получить ссылку в правом верхнем углу, скопируйте ссылку. В FlClashX перейдите в раздел Профили, нажмите кнопку +, выберите URL, вставьте вашу скопированную ссылку и нажмите Отправить
  ## [usage] Подключение и использование
  Выберите добавленный профиль в разделе Профили. В Панели управления нажмите кнопку включить в правом нижнем углу. После запуска в разделе Прокси вы можете изменить выбор сервера к которому вас подключит.

