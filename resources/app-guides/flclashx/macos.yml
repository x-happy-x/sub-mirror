app: flclashx
os: macos
template: |
  ## [download] Установка приложения
  Выберите подходящую версию для вашего устройства, нажмите на кнопку ниже и установите приложение.
  [button:macOS (Apple Silicon)](https://github.com/pluralplay/FlClashX/releases/latest/download/FlClashX-macos-arm64.dmg)
  [button:macOS (Intel)](https://github.com/pluralplay/FlClashX/releases/latest/download/FlClashX-macos-amd64.dmg)
  ## [add] Добавление подписки
  Нажмите кнопку ниже, чтобы добавить подписку
  [button:Добавить подписку]({DEEPLINK})
  ## [warning] Если подписка не добавилась
  Если после нажатия на кнопку ничего не произошло, добавьте подписку вручную.
  Нажмите на этой странице кнопку «Показать ссылку и QR» и скопируйте ссылку.
  В FlClashX перейдите в раздел Профили, нажмите кнопку +, выберите URL, вставьте вашу скопированную ссылку и нажмите Отправить
  ## [usage] Подключение и использование
  Выберите добавленный профиль в разделе Профили. В Панели управления нажмите кнопку включить в правом нижнем углу, а затем включите переключатель у пункта TUN. После запуска в разделе Прокси вы можете изменить выбор сервера к которому вас подключит.
