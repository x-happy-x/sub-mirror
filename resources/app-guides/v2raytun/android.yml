  ## [download] Установка приложения
  Откройте страницу в Google Play и установите приложение. Или установите приложение из APK файла напрямую, если Google Play не работает.
  [button:Открыть в Google Play](https://play.google.com/store/apps/details?id=com.v2raytun.android)
  [button:Скачать APK](https://github.com/DigneZzZ/v2raytun/releases/latest/download/v2RayTun_universal.apk)
  ## [add] Добавление подписки
  Нажмите кнопку ниже, чтобы добавить подписку
  [button:Добавить подписку]({DEEPLINK})
  ## [warning] Если подписка не добавилась
  Если после нажатия ничего не произошло, откройте блок ссылки и QR, скопируйте короткую ссылку и добавьте ее вручную через URL.
  ## [usage] Подключение и использование
  Откройте приложение и подключитесь к серверу
