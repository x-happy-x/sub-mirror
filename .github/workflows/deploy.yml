name: Deploy

on:
  workflow_run:
    workflows: ["Docker Image"]
    types: [completed]
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose and resources to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,resources"
          target: ${{ secrets.REMOTE_DIR }}

      - name: Pull and restart on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.REMOTE_DIR }}"
            docker login ghcr.io -u "${{ secrets.GHCR_USER }}" -p "${{ secrets.GHCR_TOKEN }}"
            docker compose pull
            docker compose up -d
            curl -fsS http://127.0.0.1:25500/health >/dev/null
            echo "[OK] deploy finished"
