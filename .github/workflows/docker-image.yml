name: CI/CD

on:
  push:
    branches:
      - "main"
      - "master"
  pull_request:
    branches:
      - "main"
      - "master"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend deps
        run: npm ci
        working-directory: ./app

      - name: Run backend tests
        run: node --test app/server.test.js

      - name: Install frontend deps
        run: npm ci
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/x-happy-x/sub-mirror:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            REMOTE_DIR="${{ secrets.REMOTE_DIR }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            DEPLOY_USER="$(id -un)"
            DEPLOY_GROUP="$(id -gn)"

            mkdir -p "${REMOTE_DIR}"

            # Try to fix ownership when directory was created by another user (for example root).
            if [ ! -w "${REMOTE_DIR}" ] || { [ -e "${REMOTE_DIR}/.git" ] && [ ! -r "${REMOTE_DIR}/.git" ]; }; then
              if command -v sudo >/dev/null 2>&1; then
                sudo chown -R "${DEPLOY_USER}:${DEPLOY_GROUP}" "${REMOTE_DIR}" || true
              fi
            fi

            if [ ! -w "${REMOTE_DIR}" ] || { [ -e "${REMOTE_DIR}/.git" ] && [ ! -r "${REMOTE_DIR}/.git" ]; }; then
              echo "[ERR] no write/read permissions for ${REMOTE_DIR} (user: ${DEPLOY_USER})" >&2
              echo "Fix on server: sudo chown -R ${DEPLOY_USER}:${DEPLOY_GROUP} ${REMOTE_DIR}" >&2
              exit 1
            fi

            cd "${REMOTE_DIR}"
            git config --global --add safe.directory "${REMOTE_DIR}"

            if [ ! -d .git ]; then
              if [ -n "$(ls -A . 2>/dev/null)" ]; then
                git init
                git remote add origin "${REPO_URL}" || git remote set-url origin "${REPO_URL}"
              else
                git clone "${REPO_URL}" .
              fi
            fi

            git fetch origin --prune
            git checkout -B "${{ github.ref_name }}" "origin/${{ github.ref_name }}"
            git reset --hard "${{ github.sha }}"
            git clean -fd

            docker login ghcr.io -u "${{ secrets.GHCR_USER }}" -p "${{ secrets.GHCR_TOKEN }}"
            docker compose pull
            docker compose up -d

            for i in $(seq 1 60); do
              if curl -fsS http://127.0.0.1:25500/health >/dev/null 2>&1; then
                echo "[OK] health endpoint is up"
                exit 0
              fi
              sleep 2
            done

            echo "[ERR] healthcheck failed" >&2
            docker compose ps >&2 || true
            docker compose logs --tail 120 >&2 || true
            exit 1
