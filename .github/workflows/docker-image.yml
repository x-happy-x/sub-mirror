name: CI/CD

on:
  push:
    branches:
      - "main"
      - "master"
  pull_request:
    branches:
      - "main"
      - "master"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend deps
        run: npm ci
        working-directory: ./app

      - name: Run backend tests
        run: node --test app/server.test.js

      - name: Install frontend deps
        run: npm ci
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/x-happy-x/sub-mirror:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -Eeuo pipefail
            REMOTE_DIR="${{ secrets.REMOTE_DIR }}"
            REPO_URL="https://github.com/x-happy-x/sub-lab.git"
            DEPLOY_USER="$(id -un)"
            DEPLOY_GROUP="$(id -gn)"
            FAILED_COMMAND=""
            COMPOSE_FILE=""

            on_error() {
              exit_code=$?
              echo "[ERR] deploy failed with exit code ${exit_code} at line ${1}: ${FAILED_COMMAND}" >&2
              echo "[ERR] pwd: $(pwd)" >&2
              echo "[ERR] whoami: $(id -un)" >&2
              echo "[ERR] docker version:" >&2
              docker --version >&2 || true
              echo "[ERR] docker compose version:" >&2
              docker compose version >&2 || true
              if [ -n "${COMPOSE_FILE}" ]; then
                echo "[ERR] docker compose ps:" >&2
                docker compose -f "${COMPOSE_FILE}" ps >&2 || true
                echo "[ERR] docker compose logs --tail 200:" >&2
                docker compose -f "${COMPOSE_FILE}" logs --tail 200 >&2 || true
              else
                echo "[ERR] docker compose ps:" >&2
                docker compose ps >&2 || true
                echo "[ERR] docker compose logs --tail 200:" >&2
                docker compose logs --tail 200 >&2 || true
              fi
              exit "${exit_code}"
            }

            trap 'on_error $LINENO' ERR
            trap 'FAILED_COMMAND=$BASH_COMMAND' DEBUG

            log_step() {
              echo "[DEPLOY] $*"
            }

            describe_path() {
              target="$1"
              if [ -e "${target}" ]; then
                echo "[DEPLOY] path info for ${target}:" >&2
                ls -ld "${target}" >&2 || true
                stat -c '[DEPLOY] owner=%U group=%G perms=%A mode=%a path=%n' "${target}" >&2 || true
              else
                echo "[DEPLOY] path does not exist yet: ${target}" >&2
              fi
            }

            log_step "ensure remote directory exists: ${REMOTE_DIR}"
            mkdir -p "${REMOTE_DIR}"
            describe_path "${REMOTE_DIR}"

            # Try to fix ownership when directory was created by another user (for example root).
            if [ ! -w "${REMOTE_DIR}" ] || { [ -e "${REMOTE_DIR}/.git" ] && [ ! -r "${REMOTE_DIR}/.git" ]; }; then
              if command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
                log_step "attempt chown for ${REMOTE_DIR}"
                sudo -n chown -R "${DEPLOY_USER}:${DEPLOY_GROUP}" "${REMOTE_DIR}" || true
                describe_path "${REMOTE_DIR}"
              else
                echo "[DEPLOY] passwordless sudo is unavailable for ${DEPLOY_USER}; cannot auto-fix ownership" >&2
              fi
            fi

            if [ ! -w "${REMOTE_DIR}" ] || { [ -e "${REMOTE_DIR}/.git" ] && [ ! -r "${REMOTE_DIR}/.git" ]; }; then
              describe_path "${REMOTE_DIR}"
              echo "[ERR] no write/read permissions for ${REMOTE_DIR} (user: ${DEPLOY_USER})" >&2
              echo "Fix on server: sudo chown -R ${DEPLOY_USER}:${DEPLOY_GROUP} ${REMOTE_DIR}" >&2
              exit 1
            fi

            log_step "enter remote directory"
            cd "${REMOTE_DIR}"
            log_step "mark git safe.directory"
            git config --global --add safe.directory "${REMOTE_DIR}"

            if [ ! -d .git ]; then
              if [ -n "$(ls -A . 2>/dev/null)" ]; then
                log_step "initialize git repository in existing non-empty directory"
                git init
                git remote add origin "${REPO_URL}" || git remote set-url origin "${REPO_URL}"
              else
                log_step "clone repository ${REPO_URL}"
                git clone "${REPO_URL}" .
              fi
            fi

            log_step "sync git state from origin"
            git fetch origin --prune
            git checkout -B "${{ github.ref_name }}" "origin/${{ github.ref_name }}"
            git reset --hard "${{ github.sha }}"
            git clean -fd

            COMPOSE_FILE="docker-compose.yml"
            log_step "login to ghcr.io"
            docker login ghcr.io -u "${{ secrets.GHCR_USER }}" -p "${{ secrets.GHCR_TOKEN }}"
            log_step "pull docker images"
            docker compose pull
            log_step "start docker compose stack"
            docker compose up -d

            log_step "wait for health endpoint http://127.0.0.1:25500/health"
            for i in $(seq 1 60); do
              if curl -fsS http://127.0.0.1:25500/health >/dev/null 2>&1; then
                echo "[OK] health endpoint is up"
                exit 0
              fi
              sleep 2
            done

            echo "[ERR] healthcheck failed" >&2
            docker compose ps >&2 || true
            docker compose logs --tail 120 >&2 || true
            exit 1
